name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      # OIDC trusted publishing needs npm >= 11.5.1 (Node 22 ships npm 10.x).
      # Pin to 11.x: npm@latest is now 12.0.0, which regressed provenance
      # ("Cannot find module 'sigstore'"). 11.x has working --provenance.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Auth via OIDC trusted publisher (no NPM_TOKEN); requires id-token: write.
      - run: npm publish --provenance --access public
