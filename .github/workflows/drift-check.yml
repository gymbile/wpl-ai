name: Exercise catalog drift check

on:
  schedule:
    - cron: '0 14 * * 1'
  pull_request:
  workflow_dispatch:

jobs:
  vendored-matches-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest gymbile/wpl tag
        id: tag
        run: |
          latest=$(git ls-remote --tags https://github.com/gymbile/wpl.git \
                  | grep 'refs/tags/v' | grep -v '\^{}' \
                  | sed 's|.*refs/tags/||' | sort -V | tail -1)
          echo "latest=$latest" >> $GITHUB_OUTPUT
      - name: Read vendored version
        id: vendored
        run: echo "version=$(cat src/data/exercises-version.txt)" >> $GITHUB_OUTPUT
      - name: Diff vendored exercises.json against upstream
        run: |
          curl -sSL "https://raw.githubusercontent.com/gymbile/wpl/${{ steps.tag.outputs.latest }}/data/exercises.json" -o /tmp/upstream-exercises.json
          if ! diff -q src/data/exercises.json /tmp/upstream-exercises.json > /dev/null; then
            echo "::error::Vendored exercises.json drifted from gymbile/wpl@${{ steps.tag.outputs.latest }} (vendored data version: ${{ steps.vendored.outputs.version }})."
            exit 1
          fi

  codegen-no-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run gen:exercises
      - name: Fail if generated catalog drifted
        run: |
          if ! git diff --quiet -- src/exercises.ts; then
            echo "::error::src/exercises.ts is out of date — run 'npm run gen:exercises' and commit."
            git --no-pager diff -- src/exercises.ts
            exit 1
          fi
